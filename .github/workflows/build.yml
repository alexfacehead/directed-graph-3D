name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
            artifact: directed_graph-macos
          - os: ubuntu-latest
            name: Linux
            artifact: directed_graph-linux
          - os: windows-latest
            name: Windows
            artifact: directed_graph-windows

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      # Linux: install OpenGL + X11 dev headers
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev libwayland-dev libxkbcommon-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j4

      # macOS: create .app bundle, ad-hoc sign, package as .dmg
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          APP="dist/Hypergraph3D.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp build/directed_graph "$APP/Contents/MacOS/"
          chmod +x "$APP/Contents/MacOS/directed_graph"
          cp packaging/macos/Info.plist "$APP/Contents/Info.plist"

          # Ad-hoc sign: changes Gatekeeper from "damaged" to "unidentified developer"
          codesign --force --deep --sign - "$APP"

          # Create .dmg from the dist folder (contains the signed .app)
          hdiutil create -volname "Hypergraph3D" -srcfolder dist/ -ov -format UDZO dist/Hypergraph3D.dmg

      - name: Package (Linux)
        if: runner.os == 'Linux' && matrix.name == 'Linux'
        run: |
          mkdir -p dist
          cp build/directed_graph dist/
          chmod +x dist/directed_graph

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp build/Release/directed_graph.exe dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  # Create a GitHub Release when a tag is pushed
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release archives
        run: |
          cd artifacts
          # macOS: .dmg is already built, just move it
          if [ -f directed_graph-macos/Hypergraph3D.dmg ]; then
            mv directed_graph-macos/Hypergraph3D.dmg ./Hypergraph3D.dmg
          fi
          # Linux: tar.gz
          if [ -d directed_graph-linux ]; then
            tar czf directed_graph-linux.tar.gz -C directed_graph-linux .
          fi
          # Windows: zip
          if [ -d directed_graph-windows ]; then
            (cd directed_graph-windows && zip -r ../directed_graph-windows.zip .)
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/Hypergraph3D.dmg
            artifacts/directed_graph-linux.tar.gz
            artifacts/directed_graph-windows.zip
