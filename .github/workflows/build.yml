name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
            artifact: directed_graph-macos
          - os: ubuntu-latest
            name: Linux
            artifact: directed_graph-linux
          - os: windows-latest
            name: Windows
            artifact: directed_graph-windows

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      # Linux: install OpenGL + X11 dev headers
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev libwayland-dev libxkbcommon-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j4

      # Package the binary
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist/Hypergraph3D
          cp build/directed_graph dist/Hypergraph3D/
          chmod +x dist/Hypergraph3D/directed_graph
          cat > dist/Hypergraph3D/Hypergraph3D.command << 'LAUNCHER'
          #!/bin/bash
          cd "$(dirname "$0")"
          xattr -cr directed_graph 2>/dev/null
          ./directed_graph
          LAUNCHER
          chmod +x dist/Hypergraph3D/Hypergraph3D.command

      - name: Package (Linux)
        if: runner.os == 'Linux' && matrix.name == 'Linux'
        run: |
          mkdir -p dist
          cp build/directed_graph dist/
          chmod +x dist/directed_graph

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp build/Release/directed_graph.exe dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  # Create a GitHub Release when a tag is pushed
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release archives
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            if [[ "$name" == *windows* ]]; then
              (cd "$name" && zip -r "../${name}.zip" .)
            elif [[ "$name" == *macos* ]]; then
              (cd "$name" && zip -r "../${name}.zip" Hypergraph3D/)
            else
              tar czf "${name}.tar.gz" -C "$name" .
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.*
